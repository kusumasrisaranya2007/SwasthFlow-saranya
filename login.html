<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SwasthFlow | Hospital Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
  <div class="app-card">

    <div class="illustration">
      <img src="swasth_logo.png" alt="SwasthFlow">
    </div>

    <div class="content">
      <h2>Hospital Login</h2>

      <div class="panel">
        <input id="hname" placeholder="Hospital Name">
        <input id="hpass" type="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <button class="secondary" onclick="goToSignup()">Create Account</button>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
